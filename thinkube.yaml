apiVersion: thinkube.io/v1
kind: ThinkubeDeployment
metadata:
  name: "{{ project_name }}"

spec:
  deployment:
    type: app

  containers:
    - name: diffusion
      build: .
      port: 7860
      size: xlarge
      gpu:
        count: 1
        memory: "20Gi"
      health: /health
      test:
        enabled: false

  routes:
    - path: /
      to: diffusion
